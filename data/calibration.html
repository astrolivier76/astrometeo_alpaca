<!DOCTYPE html>
<html lang="fr">
<head>
  <title>METEO ASTRO - Calibration MLX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Arial', sans-serif; background-color: #CCCAC9; min-height: 100vh; display: flex; flex-direction: column; }
    
    .topnav { background-color: #2c3e50; color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
    .topnav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; }
    .encadre { background-color: #46b8da; color: white; padding: 10px 20px; border-radius: 8px; text-transform: uppercase; font-weight: bold; }
    
    .btn-ota { background: linear-gradient(135deg, #46b8da 0%, #369cb9 100%); border: none; color: white; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
    .btn-ota:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .btn-ota:disabled { background: #95a5a6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-red { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
    .btn-green { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); }
    .btn-orange { background: linear-gradient(135deg, #f39c12 0%, #d35400 100%); }
    
    .content { padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    
    .card { background-color: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .card-title { font-size: 1.2rem; font-weight: bold; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #46b8da; padding-bottom: 8px; text-align: center; }
    
    .control-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .slider-container { margin-bottom: 15px; }
    .slider-container label { display: flex; justify-content: space-between; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
    .slider-container input[type=range] { width: 100%; cursor: pointer; }
    
    .status-badge { display: block; padding: 8px 10px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; color: white; background: #7f8c8d; text-align: center; margin-bottom: 15px; }
    .status-recording { background: #e74c3c; animation: pulse 2s infinite; }
    .status-optimizing { background: #9b59b6; animation: pulse 1s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    @media (max-width: 900px) { .content { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="topnav">
    <div class="topnav-content">
      <a href="/" style="color: white; text-decoration: none; font-size: 1.5rem;"><i class="fas fa-arrow-left"></i></a>
      <h1 class="encadre">CALIBRATION MLX</h1>
      <div id="recordCount" style="font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px;"><i class="fas fa-database"></i> 0 pts</div>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <p class="card-title"><i class="fas fa-satellite-dish"></i> Acquisition ESP32</p>
      <div id="recordingStatus" class="status-badge">Prêt à enregistrer</div>

      <div class="control-group">
        <button id="btnStart" class="btn-ota btn-green" onclick="sendCommand('start')"><i class="fas fa-play"></i> Démarrer</button>
        <button id="btnStop" class="btn-ota btn-red" onclick="sendCommand('stop')" style="display: none;"><i class="fas fa-stop"></i> Arrêter</button>
        <button class="btn-ota btn-orange" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Exporter CSV</button>
        <button class="btn-ota btn-red" onclick="sendCommand('clear')" style="font-size: 0.85rem;"><i class="fas fa-trash"></i> Vider l'ESP32</button>
      </div>

      <p class="card-title" style="margin-top: 25px;"><i class="fas fa-moon"></i> Seuil d'Arrêt Auto</p>
      <div style="display: flex; align-items: center; justify-content: space-between; background: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <label for="inputLuxThreshold" style="font-weight: bold; color: #2c3e50; font-size: 0.95rem;">Arrêter si &lt; (Lux)</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input type="number" id="inputLuxThreshold" min="0" max="88000" step="0.1" style="padding: 10px; width: 85px; border: 1px solid #bdc3c7; border-radius: 6px; text-align: center; font-size: 1rem; font-weight: bold; color: #2c3e50;">
          <button id="btnSaveLux" class="btn-ota btn-green" onclick="sendLuxThreshold()" style="padding: 10px 15px; width: auto; margin: 0;"><i class="fas fa-save"></i></button>
        </div>
      </div>

      <p class="card-title" style="margin-top: 20px;"><i class="fas fa-sliders-h"></i> Simulation & Lissage</p>
      
      <div id="sliders"></div>

      <div class="control-group" style="margin-top: 20px;">
        <button id="btnOpt" class="btn-ota" onclick="sendCommand('optimize')" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);"><i class="fas fa-magic"></i> Lissage Auto </button>
      </div>
    </div>

    <div class="card" style="min-height: 600px; display: flex; flex-direction: column;">
      <p class="card-title"><i class="fas fa-chart-area"></i> Suivi Temporel</p>
      <div style="flex-grow: 1; position: relative;"><canvas id="skyChart"></canvas></div>
    </div>
  </div>

  <script>
    let chart;
    let dataHistory = [];
    const K_LIMITS = { K1: [0,100], K2: [-50,50], K3: [0,50], K4: [0,200], K5: [0,200] };
    let currentK = { K1: 33, K2: 0, K3: 4, K4: 100, K5: 100 };

    function calcTsky(Ta, TsBrute, K) {
      let Td = (K.K1/100.0) * (Ta - K.K2/10.0) + (K.K3/100.0) * Math.pow(Math.exp(K.K4/1000.0 * Ta), (K.K5/100.0));
      return TsBrute - Td;
    }

    window.onload = () => {
      initSliders();
      initChart();
      syncWithESP(); 
      setInterval(syncWithESP, 5000); 
    };

    function initSliders() {
      const container = document.getElementById('sliders');
      Object.keys(currentK).forEach(k => {
        container.innerHTML += `
          <div class="slider-container">
            <label>${k} <span id="val${k}">${currentK[k]}</span></label>
            <input type="range" id="slider${k}" min="${K_LIMITS[k][0]}" max="${K_LIMITS[k][1]}" value="${currentK[k]}" oninput="updateK('${k}', this.value)">
          </div>`;
      });
    }

    function updateK(key, value) {
      currentK[key] = parseFloat(value);
      document.getElementById(`val${key}`).innerText = value;
      updateChartData(); 
    }

    function initChart() {
      const ctx = document.getElementById('skyChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: 'Ciel Corrigé (°C)', data: [], borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)', borderWidth: 3, fill: true, tension: 0.3 },
          { label: 'Air Ambiant (°C)', data: [], borderColor: '#e67e22', borderDash: [5, 5], borderWidth: 2, fill: false, tension: 0.3 }
        ]},
        options: { responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, elements: { point: { radius: 2 } } }
      });
    }

    function updateChartData() {
      chart.data.labels = dataHistory.map((_, i) => `Pt ${i+1}`);
      chart.data.datasets[1].data = dataHistory.map(d => d.Ta);
      chart.data.datasets[0].data = dataHistory.map(d => calcTsky(d.Ta, d.Ts, currentK));
      chart.update();
    }

    // NOUVEAU : Fonction pour envoyer le seuil de Lux à l'ESP32 au clic du bouton
    async function sendLuxThreshold() {
      const value = document.getElementById('inputLuxThreshold').value;
      if(value === "") return; // Sécurité si le champ est vide
      
      const formData = new URLSearchParams();
      formData.append('threshold', value);
      
      // Animation du bouton pour montrer que l'action est prise en compte
      const btn = document.getElementById('btnSaveLux');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      
      await fetch('/api/calib/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      });

      // Feedback visuel de succès
      btn.innerHTML = '<i class="fas fa-check"></i>';
      setTimeout(() => { btn.innerHTML = '<i class="fas fa-save"></i>'; }, 2000);
      
      syncWithESP(); // Force la resynchronisation
    }

    // --- SYNCHRONISATION AVEC L'ESP32 ---
    async function syncWithESP() {
      try {
        const res = await fetch('/api/calib/data');
        const state = await res.json();
        
        dataHistory = state.data;
        document.getElementById('recordCount').innerHTML = `<i class="fas fa-database"></i> ${state.count} pts / 720`;
        
        const status = document.getElementById('recordingStatus');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnOpt = document.getElementById('btnOpt');

        if (state.isOptimizing) {
          status.innerText = "L'IA calcule sur l'ESP32...";
          status.className = "status-badge status-optimizing";
          btnOpt.disabled = true;
          btnOpt.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calcul en cours...';
        } else {
          btnOpt.disabled = false;
          btnOpt.innerHTML = '<i class="fas fa-magic"></i> Lissage Auto (IA ESP32)';
          
          if (state.isRecording) {
            status.innerText = "ESP32 Enregistre (1 pt/min)";
            status.className = "status-badge status-recording";
            btnStart.style.display = "none";
            btnStop.style.display = "flex";
          } else {
            status.innerText = "ESP32 en veille";
            status.className = "status-badge";
            btnStart.style.display = "flex";
            btnStop.style.display = "none";
          }
          
          // MODIFICATION : Mise à jour du champ numérique seulement s'il n'est pas en cours d'édition
          if (document.activeElement.id !== 'inputLuxThreshold') {
            document.getElementById('inputLuxThreshold').value = state.luxThreshold;
          }

          if (document.activeElement.type !== 'range') {
            currentK.K1 = state.k[0]; currentK.K2 = state.k[1]; currentK.K3 = state.k[2]; currentK.K4 = state.k[3]; currentK.K5 = state.k[4];
            Object.keys(currentK).forEach(k => {
              document.getElementById(`slider${k}`).value = currentK[k];
              document.getElementById(`val${k}`).innerText = currentK[k].toFixed(1);
            });
            updateChartData();
          }
        }
      } catch (e) { console.error("Erreur de synchronisation", e); }
    }

    async function sendCommand(action) {
      if(action === 'clear' && !confirm("Voulez-vous vraiment effacer la mémoire de l'ESP32 ?")) return;
      if(action === 'optimize' && dataHistory.length < 5) return alert("Pas assez de données pour lancer l'IA.");
      
      const formData = new URLSearchParams();
      formData.append('action', action);
      
      await fetch('/api/calib/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      });
      syncWithESP(); 
    }

    function exportCSV() {
      if (dataHistory.length === 0) return alert("Aucune donnée à exporter.");
      let csvContent = "data:text/csv;charset=utf-8,Point,Temp_Ambiante,Temp_Ciel_Infrarouge_Brute\n";
      dataHistory.forEach((row, index) => {
        csvContent += `${index+1},${row.Ta.toFixed(2)},${row.Ts.toFixed(2)}\n`;
      });
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `Calibration_Astro_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
